<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #faf6f1; --surface: #ffffff; --surface2: #f3ede6;
    --border: rgba(111,71,41,0.1); --text: #2c1a0e; --muted: rgba(44,26,14,0.45);
    --brown: #6f4729; --brown-light: #a0714f;
    --green: #3a7d44; --green-dim: rgba(58,125,68,0.08); --green-border: rgba(58,125,68,0.25);
    --red: #b94040; --red-dim: rgba(185,64,64,0.07); --red-border: rgba(185,64,64,0.25);
    --gold: #c9920a; --gold-dim: rgba(201,146,10,0.1); --gold-border: rgba(201,146,10,0.3);
    --silver: #7a8a99; --silver-dim: rgba(122,138,153,0.1);
    --bronze: #a0602a; --bronze-dim: rgba(160,96,42,0.1);
    --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif; --serif: 'Playfair Display', serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  body { display: flex; flex-direction: column; min-height: 100dvh; padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0); }
  .top-band { height: 4px; background: linear-gradient(90deg,#6f4729,#a0714f,#c9956a,#a0714f,#6f4729); flex-shrink:0; }
  .app { flex:1; display:flex; flex-direction:column; max-width:420px; margin:0 auto; width:100%; padding:1.75rem 1.25rem 1.5rem; gap:1.15rem; }

  .header { display:flex; align-items:flex-start; justify-content:space-between; }
  .header-left { display:flex; align-items:center; gap:10px; }
  .coffee-icon { font-size:32px; line-height:1; }
  .header-label { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--brown-light); margin-bottom:3px; }
  .header-title { font-family:var(--serif); font-size:22px; font-weight:400; color:var(--brown); letter-spacing:-0.01em; }
  .header-time { font-family:var(--mono); font-size:11px; color:var(--muted); text-align:right; line-height:1.7; padding-top:4px; }
  .divider { border:none; border-top:1px solid var(--border); }

  /* Loading */
  .loading-bar { font-family:var(--mono); font-size:11px; color:var(--brown-light); text-align:center; padding:0.5rem; display:none; }
  .loading-bar.show { display:block; }

  /* Status */
  .status-block { border-radius:18px; border:1px solid var(--border); background:var(--surface); padding:1.25rem; display:flex; flex-direction:column; align-items:center; gap:0.4rem; transition:border-color 0.4s; position:relative; overflow:hidden; }
  .status-block::before { content:''; position:absolute; inset:0; opacity:0; transition:opacity 0.4s; pointer-events:none; border-radius:inherit; }
  .status-block.clean { border-color:var(--green-border); }
  .status-block.clean::before { background:var(--green-dim); opacity:1; }
  .status-block.dirty { border-color:var(--red-border); }
  .status-block.dirty::before { background:var(--red-dim); opacity:1; }
  .status-icon-wrap { width:52px; height:52px; border-radius:50%; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:24px; position:relative; z-index:1; transition:border-color 0.4s,background 0.4s; }
  .clean .status-icon-wrap { background:var(--green-dim); border-color:var(--green-border); }
  .dirty .status-icon-wrap { background:var(--red-dim); border-color:var(--red-border); }
  .status-state { font-family:var(--serif); font-size:19px; font-weight:400; position:relative; z-index:1; color:var(--text); transition:color 0.4s; }
  .clean .status-state { color:var(--green); }
  .dirty .status-state { color:var(--red); }
  .status-since { font-family:var(--mono); font-size:11px; color:var(--muted); position:relative; z-index:1; }

  /* Leaderboard */
  .section-label { font-family:var(--mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--brown-light); margin-bottom:0.6rem; }
  .leaderboard { display:flex; flex-direction:column; gap:7px; }
  .podium-row { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
  .rank-card { border-radius:14px; border:1px solid var(--border); background:var(--surface); padding:0.875rem 0.5rem; text-align:center; display:flex; flex-direction:column; align-items:center; gap:3px; }
  .rank-card.gold { border-color:var(--gold-border); background:var(--gold-dim); }
  .rank-card.silver { border-color:rgba(122,138,153,0.3); background:var(--silver-dim); }
  .rank-card.bronze { border-color:rgba(160,96,42,0.3); background:var(--bronze-dim); }
  .rank-trophy { font-size:20px; line-height:1; margin-bottom:2px; }
  .rank-avatar { font-size:22px; line-height:1; }
  .rank-name { font-size:12px; font-weight:500; color:var(--text); margin-top:2px; }
  .rank-count { font-family:var(--mono); font-size:11px; color:var(--muted); }
  .rank-title { font-family:var(--mono); font-size:9px; letter-spacing:0.08em; text-transform:uppercase; margin-top:2px; }
  .gold .rank-title { color:var(--gold); }
  .silver .rank-title { color:var(--silver); }
  .bronze .rank-title { color:var(--bronze); }
  .rank-others { display:flex; flex-direction:column; gap:6px; }
  .rank-row { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 14px; }
  .rank-pos { font-family:var(--mono); font-size:12px; color:var(--muted); width:18px; text-align:center; }
  .rank-row-avatar { font-size:18px; }
  .rank-row-name { flex:1; font-size:13px; font-weight:500; color:var(--text); }
  .rank-row-count { font-family:var(--mono); font-size:12px; color:var(--muted); }

  /* Name picker */
  .name-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; }
  .name-btn { padding:10px 4px; border-radius:12px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-family:var(--sans); font-size:12px; font-weight:400; cursor:pointer; text-align:center; -webkit-tap-highlight-color:transparent; transition:border-color 0.15s,background 0.15s,transform 0.1s; display:flex; flex-direction:column; align-items:center; gap:3px; }
  .name-btn .avatar { font-size:18px; line-height:1; }
  .name-btn:active { transform:scale(0.96); }
  .name-btn.selected { border-color:var(--brown-light); background:rgba(111,71,41,0.06); color:var(--brown); font-weight:500; }

  /* Stats */
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .stat { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:0.75rem 0.5rem; text-align:center; }
  .stat-val { font-family:var(--serif); font-size:24px; font-weight:400; color:var(--brown); line-height:1; margin-bottom:4px; }
  .stat-lbl { font-size:11px; color:var(--muted); letter-spacing:0.02em; }
  .streak-val { color:var(--gold); }

  /* Button */
  .btn-clean { width:100%; padding:17px; border-radius:14px; border:1px solid var(--green-border); background:var(--green-dim); color:var(--green); font-family:var(--sans); font-size:15px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; -webkit-tap-highlight-color:transparent; transition:background 0.15s,transform 0.1s,opacity 0.2s; position:relative; overflow:hidden; }
  .btn-clean:active { transform:scale(0.97); background:rgba(58,125,68,0.14); }
  .btn-clean:disabled { opacity:0.4; }
  .btn-clean svg { width:17px; height:17px; }
  .no-name-hint { font-family:var(--mono); font-size:11px; color:var(--red); text-align:center; display:none; }
  .no-name-hint.show { display:block; }
  .saving-bar { font-family:var(--mono); font-size:11px; color:var(--brown-light); text-align:center; min-height:16px; transition:opacity 0.3s; opacity:0; }
  .saving-bar.show { opacity:1; }

  /* Log */
  .log-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.6rem; }
  .log-title { font-family:var(--mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--brown-light); }
  .btn-refresh { font-family:var(--mono); font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--brown-light); background:none; border:none; cursor:pointer; -webkit-tap-highlight-color:transparent; padding:4px 0; }
  .log-list { display:flex; flex-direction:column; gap:6px; }
  .log-empty { text-align:center; padding:1.5rem 0; font-size:13px; color:var(--muted); font-family:var(--mono); }
  .log-item { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 14px; animation:slideIn 0.22s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
  .log-avatar { font-size:16px; flex-shrink:0; }
  .log-name { font-size:13px; font-weight:500; color:var(--brown); min-width:52px; }
  .log-date { flex:1; font-family:var(--mono); font-size:11px; color:var(--muted); }
  .log-ago { font-family:var(--mono); font-size:11px; color:var(--muted); }

  @keyframes ripple { from{transform:scale(0);opacity:0.4} to{transform:scale(4);opacity:0} }
  .ripple { position:absolute; border-radius:50%; width:60px; height:60px; background:var(--green); pointer-events:none; animation:ripple 0.5s ease-out forwards; }
  .flash { position:fixed; inset:0; background:rgba(58,125,68,0.05); pointer-events:none; animation:flash 0.4s ease-out forwards; z-index:100; }
  @keyframes flash { from{opacity:1} to{opacity:0} }
  .footer { text-align:center; font-family:var(--mono); font-size:10px; color:rgba(111,71,41,0.2); padding-bottom:0.5rem; letter-spacing:0.08em; }
</style>
</head>
<body>
<div class="top-band"></div>
<div class="app">

  <div class="header">
    <div class="header-left">
      <div class="coffee-icon">☕</div>
      <div>
        <div class="header-label">Coffee machine</div>
        <div class="header-title">Milk clean log</div>
      </div>
    </div>
    <div class="header-time" id="headerTime"></div>
  </div>

  <hr class="divider">

  <div class="loading-bar" id="loadingBar">☕ Syncing with Google Sheets…</div>

  <div class="status-block" id="statusBlock">
    <div class="status-icon-wrap"><span id="statusEmoji">☕</span></div>
    <div class="status-state" id="statusState">Loading…</div>
    <div class="status-since" id="statusSince"></div>
  </div>

  <div>
    <div class="section-label">👑 Clean Queen / King</div>
    <div class="leaderboard" id="leaderboard"><div class="log-empty">Loading…</div></div>
  </div>

  <hr class="divider">

  <div>
    <div class="section-label">Who are you?</div>
    <div class="name-grid" id="nameGrid"></div>
  </div>

  <div class="no-name-hint" id="noNameHint">Please select your name first</div>

  <button class="btn-clean" id="btnClean" onclick="logClean(event)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    Mark as cleaned
  </button>

  <div class="saving-bar" id="savingBar"></div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">total cleans</div></div>
    <div class="stat"><div class="stat-val streak-val" id="statStreak">—</div><div class="stat-lbl">day streak</div></div>
    <div class="stat"><div class="stat-val" id="statToday">—</div><div class="stat-lbl">today</div></div>
  </div>

  <div>
    <div class="log-header">
      <div class="log-title">☕ History</div>
      <button class="btn-refresh" onclick="fetchFromSheet()">↻ Refresh</button>
    </div>
    <div class="log-list" id="logList"><div class="log-empty">Loading…</div></div>
  </div>

  <div class="footer">milk · clean · repeat</div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxy5dOIugNnwmnr7BinsGxKf1m5I2ivJkQKYqb6wek2zeTehhnCQL3UkH6jehgFtWWG/exec';
const NAME_KEY = 'milk_clean_name';

const MEMBERS = [
  { name: 'Emma',    avatar: '👩' },
  { name: 'An',      avatar: '👩‍🦳' },
  { name: 'Jan',     avatar: '👨' },
  { name: 'Charlie', avatar: '🧑' },
];

const MEDALS = [
  { cls: 'gold',   trophy: '🥇', title: 'Clean Queen/King' },
  { cls: 'silver', trophy: '🥈', title: 'Runner-up' },
  { cls: 'bronze', trophy: '🥉', title: 'Third place' },
];

let entries = []; // loaded from Google Sheets
let selectedName = localStorage.getItem(NAME_KEY) || '';

function getAvatar(name) {
  const m = MEMBERS.find(x => x.name === name);
  return m ? m.avatar : '👤';
}

function timeAgo(ts) {
  if (!ts) return '';
  const s = (Date.now() - ts) / 1000;
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()] +
    ' · ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function fmtForSheet(ts) {
  const d = new Date(ts);
  return {
    date: d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear(),
    time: d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0')
  };
}

function isSameDay(ts) {
  const d = new Date(ts), n = new Date();
  return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate();
}

function calcStreak() {
  if (!entries.length) return 0;
  const unique = [];
  entries.forEach(e => {
    if (!e.ts) return;
    const d = new Date(e.ts);
    const key = d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
    if (!unique.includes(key)) unique.push(key);
  });
  unique.sort().reverse();
  let streak = 0, ref = new Date(); ref.setHours(0,0,0,0);
  for (const key of unique) {
    const [y,m,d] = key.split('-').map(Number);
    const day = new Date(y,m,d);
    const diff = Math.round((ref-day)/86400000);
    if (diff<=1) { streak++; ref=day; } else break;
  }
  return streak;
}

function getScores() {
  const scores = {};
  MEMBERS.forEach(m => scores[m.name] = 0);
  entries.forEach(e => {
    if (scores[e.name] !== undefined) scores[e.name]++;
    else scores[e.name] = 1;
  });
  return MEMBERS.map(m => ({ name: m.name, avatar: m.avatar, count: scores[m.name] }))
    .sort((a,b) => b.count - a.count);
}

function render() {
  const now = Date.now();
  const last = entries[0];

  // Status
  const block = document.getElementById('statusBlock');
  const state = document.getElementById('statusState');
  const since = document.getElementById('statusSince');
  const emoji = document.getElementById('statusEmoji');

  if (!last) {
    block.className = 'status-block';
    emoji.textContent = '☕';
    state.textContent = 'Not cleaned yet';
    since.textContent = 'log your first clean below';
  } else {
    const hrs = last.ts ? (now - last.ts) / 3600000 : 999;
    if (hrs < 12) {
      block.className = 'status-block clean';
      emoji.textContent = '✓';
      state.textContent = 'Clean';
      since.textContent = getAvatar(last.name) + ' ' + last.name + (last.ts ? ' · ' + timeAgo(last.ts) : '');
    } else {
      block.className = 'status-block dirty';
      emoji.textContent = '!';
      state.textContent = 'Needs cleaning';
      since.textContent = 'last cleaned by ' + last.name + (last.ts ? ' · ' + timeAgo(last.ts) : '');
    }
  }

  // Stats
  const todayCount = entries.filter(e => e.ts && isSameDay(e.ts)).length;
  document.getElementById('statTotal').textContent = entries.length;
  document.getElementById('statStreak').textContent = calcStreak();
  document.getElementById('statToday').textContent = todayCount;

  // Leaderboard
  const scores = getScores();
  const lb = document.getElementById('leaderboard');
  if (scores.every(s => s.count === 0)) {
    lb.innerHTML = '<div class="log-empty">— No cleans yet. Who goes first? —</div>';
  } else {
    const top3 = scores.slice(0,3);
    const rest = scores.slice(3);
    lb.innerHTML =
      '<div class="podium-row">' + top3.map((s,i) => {
        const medal = MEDALS[i];
        return `<div class="rank-card ${medal.cls}">
          <div class="rank-trophy">${medal.trophy}</div>
          <div class="rank-avatar">${s.avatar}</div>
          <div class="rank-name">${s.name}</div>
          <div class="rank-count">${s.count} clean${s.count!==1?'s':''}</div>
          <div class="rank-title">${s.count>0?medal.title:'—'}</div>
        </div>`;
      }).join('') + '</div>' +
      (rest.length ? '<div class="rank-others">' + rest.map((s,i) => `
        <div class="rank-row">
          <div class="rank-pos">${i+4}</div>
          <div class="rank-row-avatar">${s.avatar}</div>
          <div class="rank-row-name">${s.name}</div>
          <div class="rank-row-count">${s.count} cleans</div>
        </div>`).join('') + '</div>' : '');
  }

  // History
  const list = document.getElementById('logList');
  if (!entries.length) { list.innerHTML = '<div class="log-empty">— no entries yet —</div>'; return; }
  list.innerHTML = entries.slice(0,20).map((e,i) => `
    <div class="log-item" style="animation-delay:${i*0.03}s">
      <div class="log-avatar">${getAvatar(e.name)}</div>
      <div class="log-name">${e.name}</div>
      <div class="log-date">${e.ts ? fmtDate(e.ts) : '—'}</div>
      <div class="log-ago">${e.ts ? timeAgo(e.ts) : ''}</div>
    </div>`).join('');
}

function buildNameGrid() {
  document.getElementById('nameGrid').innerHTML = MEMBERS.map(m => `
    <button class="name-btn ${selectedName===m.name?'selected':''}" onclick="selectName('${m.name}')">
      <span class="avatar">${m.avatar}</span>${m.name}
    </button>`).join('');
}

function selectName(name) {
  selectedName = name;
  localStorage.setItem(NAME_KEY, name);
  document.getElementById('noNameHint').classList.remove('show');
  buildNameGrid();
}

async function fetchFromSheet() {
  const bar = document.getElementById('loadingBar');
  bar.classList.add('show');
  try {
    const res = await fetch(SHEET_URL + '?t=' + Date.now());
    const data = await res.json();
    // Parse entries — sort by ts descending, fallback to row order
    entries = data
      .filter(r => r.name)
      .map(r => {
        let ts = null;
        if (r.ts && !isNaN(Number(r.ts)) && Number(r.ts) > 1000000000000) {
          ts = Number(r.ts);
        }
        if (!ts) {
          try {
            const dateStr = String(r.date || '');
            const timeStr = String(r.time || '00:00');
            if (dateStr.includes('T')) {
              const base = new Date(dateStr);
              const timePart = new Date(timeStr);
              base.setHours(timePart.getUTCHours(), timePart.getUTCMinutes(), 0, 0);
              ts = base.getTime();
            } else if (dateStr.includes('/')) {
              const [d, m, y] = dateStr.split('/');
              const [hh, mm] = timeStr.split(':');
              ts = new Date(Number(y), Number(m)-1, Number(d), Number(hh), Number(mm)).getTime();
            }
          } catch(e) {}
        }
        return { name: r.name, ts };
      })
      .sort((a,b) => {
        if (a.ts && b.ts) return b.ts - a.ts;
        return 0;
      });
    render();
  } catch(e) {
    console.log('Fetch failed:', e);
    document.getElementById('statusState').textContent = 'Could not load data';
    document.getElementById('statusSince').textContent = 'Check your connection';
  }
  bar.classList.remove('show');
}

async function sendToSheet(name, ts) {
  const { date, time } = fmtForSheet(ts);
  try {
    await fetch(SHEET_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, date, time, ts })
    });
  } catch(e) { console.log('Send failed:', e); }
}

async function logClean(ev) {
  if (!selectedName) { document.getElementById('noNameHint').classList.add('show'); return; }

  const btn = document.getElementById('btnClean');
  btn.disabled = true;

  // Ripple
  const rect = btn.getBoundingClientRect();
  const rip = document.createElement('span');
  rip.className = 'ripple';
  rip.style.left = (ev.clientX-rect.left-30)+'px';
  rip.style.top = (ev.clientY-rect.top-30)+'px';
  btn.appendChild(rip);
  setTimeout(() => rip.remove(), 600);

  // Flash
  const flash = document.createElement('div');
  flash.className = 'flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 400);

  const ts = Date.now();

  // Optimistically add to local entries immediately
  entries.unshift({ name: selectedName, ts, date: '', time: '' });
  render();

  const bar = document.getElementById('savingBar');
  bar.textContent = 'Saving to Google Sheets…';
  bar.classList.add('show');

  await sendToSheet(selectedName, ts);

  bar.textContent = '✓ Saved!';
  setTimeout(() => bar.classList.remove('show'), 2000);

  // Re-fetch to sync with full shared data
  setTimeout(() => fetchFromSheet(), 1500);

  setTimeout(() => { btn.disabled = false; }, 800);
}

function updateClock() {
  const d = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('headerTime').innerHTML = days[d.getDay()]+'<br>'+
    d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

buildNameGrid();
updateClock();
fetchFromSheet();
setInterval(updateClock, 10000);
// Auto-refresh from sheet every 60 seconds
setInterval(fetchFromSheet, 60000);
</script>
