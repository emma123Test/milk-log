<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf6f1">
<title>Milk Clean Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf6f1;
    --surface: #ffffff;
    --surface2: #f3ede6;
    --border: rgba(111,71,41,0.1);
    --border-strong: rgba(111,71,41,0.25);
    --text: #2c1a0e;
    --muted: rgba(44,26,14,0.45);
    --brown: #6f4729;
    --brown-light: #a0714f;
    --green: #3a7d44;
    --green-dim: rgba(58,125,68,0.08);
    --green-border: rgba(58,125,68,0.25);
    --red: #b94040;
    --red-dim: rgba(185,64,64,0.07);
    --red-border: rgba(185,64,64,0.25);
    --amber: #b07d2e;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --serif: 'Playfair Display', serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }

  .top-band {
    height: 4px;
    background: linear-gradient(90deg, #6f4729, #a0714f, #c9956a, #a0714f, #6f4729);
  }

  .app {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 420px;
    margin: 0 auto;
    width: 100%;
    padding: 1.75rem 1.25rem 1.5rem;
    gap: 1.15rem;
  }

  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .coffee-icon { font-size: 32px; line-height: 1; }
  .header-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--brown-light);
    margin-bottom: 3px;
  }
  .header-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    color: var(--brown);
    letter-spacing: -0.01em;
  }
  .header-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    line-height: 1.7;
    padding-top: 4px;
  }

  .divider { border: none; border-top: 1px solid var(--border); }

  .status-block {
    border-radius: 18px;
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.45rem;
    transition: border-color 0.4s, background 0.4s;
    position: relative;
    overflow: hidden;
  }
  .status-block::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
    border-radius: inherit;
  }
  .status-block.clean { border-color: var(--green-border); }
  .status-block.clean::before { background: var(--green-dim); opacity: 1; }
  .status-block.dirty { border-color: var(--red-border); }
  .status-block.dirty::before { background: var(--red-dim); opacity: 1; }

  .status-icon-wrap {
    width: 58px; height: 58px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    position: relative; z-index: 1;
    transition: border-color 0.4s, background 0.4s;
  }
  .clean .status-icon-wrap { background: var(--green-dim); border-color: var(--green-border); }
  .dirty .status-icon-wrap { background: var(--red-dim); border-color: var(--red-border); }

  .status-state {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 400;
    position: relative; z-index: 1;
    color: var(--text);
    transition: color 0.4s;
  }
  .clean .status-state { color: var(--green); }
  .dirty .status-state { color: var(--red); }

  .status-since {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    position: relative; z-index: 1;
  }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.875rem 0.5rem;
    text-align: center;
  }
  .stat-val {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 400;
    color: var(--brown);
    line-height: 1;
    margin-bottom: 5px;
  }
  .stat-lbl { font-size: 11px; color: var(--muted); letter-spacing: 0.02em; }
  .streak-val { color: var(--amber); }

  .btn-clean {
    width: 100%;
    padding: 17px;
    border-radius: 14px;
    border: 1px solid var(--green-border);
    background: var(--green-dim);
    color: var(--green);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, transform 0.1s, opacity 0.2s;
    position: relative; overflow: hidden;
  }
  .btn-clean:active { transform: scale(0.97); background: rgba(58,125,68,0.14); }
  .btn-clean:disabled { opacity: 0.4; }
  .btn-clean svg { width: 17px; height: 17px; }

  .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; }
  .log-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--brown-light); }
  .btn-clear {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); background: none; border: none; cursor: pointer;
    -webkit-tap-highlight-color: transparent; padding: 4px 0;
  }
  .btn-clear:active { color: var(--red); }

  .log-list { display: flex; flex-direction: column; gap: 6px; }
  .log-empty { text-align: center; padding: 2rem 0; font-size: 13px; color: var(--muted); font-family: var(--mono); }

  .log-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 11px 14px;
    animation: slideIn 0.22s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .log-pip { width: 8px; height: 8px; border-radius: 50%; background: var(--brown-light); flex-shrink: 0; opacity: 0.6; }
  .log-date { flex: 1; font-family: var(--mono); font-size: 12px; color: var(--text); }
  .log-ago { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  @keyframes ripple {
    from { transform: scale(0); opacity: 0.4; }
    to { transform: scale(4); opacity: 0; }
  }
  .ripple {
    position: absolute; border-radius: 50%; width: 60px; height: 60px;
    background: var(--green); pointer-events: none;
    animation: ripple 0.5s ease-out forwards;
  }
  .flash {
    position: fixed; inset: 0; background: rgba(58,125,68,0.05);
    pointer-events: none; animation: flash 0.4s ease-out forwards; z-index: 100;
  }
  @keyframes flash { from { opacity: 1; } to { opacity: 0; } }

  .footer {
    text-align: center; font-family: var(--mono); font-size: 10px;
    color: var(--border-strong); padding-bottom: 0.5rem; letter-spacing: 0.08em;
  }
</style>
</head>
<body>
<div class="top-band"></div>
<div class="app">

  <div class="header">
    <div class="header-left">
      <div class="coffee-icon">☕</div>
      <div>
        <div class="header-label">Coffee machine</div>
        <div class="header-title">Milk clean log</div>
      </div>
    </div>
    <div class="header-time" id="headerTime"></div>
  </div>

  <hr class="divider">

  <div class="status-block" id="statusBlock">
    <div class="status-icon-wrap"><span id="statusEmoji">☕</span></div>
    <div class="status-state" id="statusState">Not cleaned yet</div>
    <div class="status-since" id="statusSince">log your first clean below</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="statTotal">0</div>
      <div class="stat-lbl">total cleans</div>
    </div>
    <div class="stat">
      <div class="stat-val streak-val" id="statStreak">0</div>
      <div class="stat-lbl">day streak</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statToday">0</div>
      <div class="stat-lbl">today</div>
    </div>
  </div>

  <button class="btn-clean" id="btnClean" onclick="logClean(event)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    Mark as cleaned
  </button>

  <div>
    <div class="log-header">
      <div class="log-title">☕ History</div>
      <button class="btn-clear" onclick="clearLog()">Clear all</button>
    </div>
    <div class="log-list" id="logList">
      <div class="log-empty">— no entries yet —</div>
    </div>
  </div>

  <div class="footer">milk · clean · repeat</div>

</div>

<script>
const KEY = 'milk_clean_log_v1';
let entries = [];

function save() { localStorage.setItem(KEY, JSON.stringify(entries)); }
function load() {
  try { const r = localStorage.getItem(KEY); if (r) entries = JSON.parse(r); }
  catch(e) { entries = []; }
}

function timeAgo(ts) {
  const s = (Date.now() - ts) / 1000;
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function fmtDate(ts) {
  const d = new Date(ts);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const hh = d.getHours().toString().padStart(2,'0');
  const mm = d.getMinutes().toString().padStart(2,'0');
  return days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()] + ' · ' + hh + ':' + mm;
}

function isSameDay(a, b) {
  const da = new Date(a), db = new Date(b);
  return da.getFullYear()===db.getFullYear() && da.getMonth()===db.getMonth() && da.getDate()===db.getDate();
}

function calcStreak() {
  if (!entries.length) return 0;
  const unique = [];
  entries.forEach(e => {
    const d = new Date(e);
    const key = d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
    if (!unique.includes(key)) unique.push(key);
  });
  unique.sort().reverse();
  let streak = 0, ref = new Date(); ref.setHours(0,0,0,0);
  for (const key of unique) {
    const [y,m,d] = key.split('-').map(Number);
    const day = new Date(y,m,d);
    const diff = Math.round((ref-day)/86400000);
    if (diff<=1) { streak++; ref=day; } else break;
  }
  return streak;
}

function render() {
  const now = Date.now();
  const last = entries[0];
  const block = document.getElementById('statusBlock');
  const state = document.getElementById('statusState');
  const since = document.getElementById('statusSince');
  const emoji = document.getElementById('statusEmoji');

  if (!last) {
    block.className = 'status-block';
    emoji.textContent = '☕';
    state.textContent = 'Not cleaned yet';
    since.textContent = 'log your first clean below';
  } else {
    const hrs = (now - last) / 3600000;
    if (hrs < 8) {
      block.className = 'status-block clean';
      emoji.textContent = '✓';
      state.textContent = 'Clean';
      since.textContent = 'cleaned ' + timeAgo(last);
    } else {
      block.className = 'status-block dirty';
      emoji.textContent = '!';
      state.textContent = 'Needs cleaning';
      since.textContent = 'last cleaned ' + timeAgo(last);
    }
  }

  const todayCount = entries.filter(e => isSameDay(e, now)).length;
  document.getElementById('statTotal').textContent = entries.length;
  document.getElementById('statStreak').textContent = calcStreak();
  document.getElementById('statToday').textContent = todayCount;

  const list = document.getElementById('logList');
  if (!entries.length) {
    list.innerHTML = '<div class="log-empty">— no entries yet —</div>';
    return;
  }
  list.innerHTML = entries.slice(0,20).map((ts,i) => `
    <div class="log-item" style="animation-delay:${i*0.03}s">
      <div class="log-pip"></div>
      <div class="log-date">${fmtDate(ts)}</div>
      <div class="log-ago">${timeAgo(ts)}</div>
    </div>
  `).join('');
}

function logClean(e) {
  const btn = document.getElementById('btnClean');
  btn.disabled = true;
  const rect = btn.getBoundingClientRect();
  const rip = document.createElement('span');
  rip.className = 'ripple';
  rip.style.left = (e.clientX - rect.left - 30) + 'px';
  rip.style.top = (e.clientY - rect.top - 30) + 'px';
  btn.appendChild(rip);
  setTimeout(() => rip.remove(), 600);
  const flash = document.createElement('div');
  flash.className = 'flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 400);
  entries.unshift(Date.now());
  save(); render();
  setTimeout(() => { btn.disabled = false; }, 800);
}

function clearLog() {
  if (!entries.length) return;
  if (confirm('Clear all entries?')) { entries = []; save(); render(); }
}

function updateClock() {
  const d = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const hh = d.getHours().toString().padStart(2,'0');
  const mm = d.getMinutes().toString().padStart(2,'0');
  document.getElementById('headerTime').innerHTML = days[d.getDay()] + '<br>' + hh + ':' + mm;
}

load(); render(); updateClock();
setInterval(render, 60000);
setInterval(updateClock, 10000);
</script>
</body>
</html>
